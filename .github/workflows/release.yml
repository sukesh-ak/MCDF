name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and release (e.g. v0.1.0)'
        required: true

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  name: linux-x64 }
          - { os: windows-latest, name: windows-x64 }
          - { os: macos-latest,   name: macos-arm64 }

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: build/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Configure
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_MANIFEST_FEATURES=tests \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      # Ship the CLI plus the licences it is distributed under.
      - name: Stage artifact
        shell: bash
        run: |
          set -eu
          name="mcdf-${{ matrix.name }}"
          mkdir -p "dist/$name"

          bin=$(find build/apps/cli -maxdepth 2 -type f \( -name mcdf -o -name mcdf.exe \) | head -1)
          if [ -z "$bin" ]; then echo "::error::CLI binary not found"; exit 1; fi
          cp "$bin" "dist/$name/"
          cp README.md LICENSE NOTICE LICENSING.md "dist/$name/"

          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a -tzip "$name.zip" "$name" >/dev/null
          else
            tar -czf "$name.tar.gz" "$name"
          fi
          rm -rf "$name"
          ls -l

      - uses: actions/upload-artifact@v4
        with:
          name: mcdf-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: staged
          merge-multiple: true

      # The spec + conformance kit travel with the release so implementers can
      # target a fixed version without cloning.
      - name: Package spec and conformance kit
        run: |
          set -eu
          tar -czf staged/mcdf-spec-and-conformance.tar.gz spec conformance
          cd staged
          sha256sum * > SHA256SUMS
          ls -l

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -eu
          gh release create "$TAG" \
            --title "MCDF $TAG" \
            --generate-notes \
            staged/*
