name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  name: linux }
          - { os: windows-latest, name: windows }
          - { os: macos-latest,   name: macos }

    steps:
      - uses: actions/checkout@v4

      # vcpkg builds OpenSSL from source, so cache the installed tree.
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: build/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      # Uses each runner's preinstalled vcpkg and default generator (Make on
      # Linux/macOS, Visual Studio on Windows) - no extra tooling to install.
      - name: Configure
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_MANIFEST_FEATURES=tests \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  # Build the MCDF Studio GUI editor and publish the binary as an artifact.
  # GUI apps can't be launched headlessly in CI, so this verifies the build
  # compiles and links, then uploads the executable for manual testing.
  studio:
    name: studio-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, name: windows }
          - { os: ubuntu-latest,  name: linux }
          - { os: macos-latest,   name: macos }

    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: build/vcpkg_installed
          key: vcpkg-studio-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-studio-${{ runner.os }}-

      # GLFW needs X11 / Wayland / OpenGL dev libraries on Linux; Windows uses
      # Win32/OpenGL that ship with the runner.
      - name: Install GUI system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xorg-dev libxkbcommon-dev libwayland-dev wayland-protocols \
            extra-cmake-modules libgl1-mesa-dev libglu1-mesa-dev

      - name: Configure
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DMCDF_BUILD_STUDIO=ON \
            -DMCDF_BUILD_TESTS=OFF \
            -DVCPKG_MANIFEST_FEATURES=studio \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build Studio
        run: cmake --build build --config Release --parallel --target mcdf-studio

      - name: Upload Studio binary
        uses: actions/upload-artifact@v4
        with:
          name: mcdf-studio-${{ matrix.name }}
          path: |
            build/apps/studio/Release/mcdf-studio.exe
            build/apps/studio/mcdf-studio
          if-no-files-found: error

  # Coverage-guided fuzzing smoke (M8 hardening): libFuzzer + ASan over the
  # untrusted-input surfaces (TAR unpack, YAML/JSON member parsers, markdown).
  # Short seeded runs to catch regressions; longer campaigns are manual.
  fuzz:
    name: fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: build/vcpkg_installed
          key: vcpkg-fuzz-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-fuzz-${{ runner.os }}-
            vcpkg-${{ runner.os }}-

      - name: Configure (clang + libFuzzer + ASan)
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DMCDF_BUILD_TESTS=OFF \
            -DMCDF_BUILD_FUZZERS=ON \
            -DMCDF_FUZZ_ENGINE=ON \
            -DCMAKE_C_FLAGS="-fsanitize=fuzzer-no-link,address" \
            -DCMAKE_CXX_FLAGS="-fsanitize=fuzzer-no-link,address" \
            -DVCPKG_MANIFEST_FEATURES= \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build fuzzers
        run: cmake --build build --parallel --target fuzz_unpack fuzz_parsers fuzz_markdown

      - name: Fuzz (30s per target, seeded)
        env:
          ASAN_OPTIONS: detect_leaks=0  # OpenSSL init tables trip LSan
        run: |
          for t in unpack parsers markdown; do
            ./build/fuzz/fuzz_$t -max_total_time=30 -print_final_stats=1 fuzz/corpus/$t
          done

  # The reproducible Linux build, exactly as a contributor would run it.
  docker:
    name: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (compiles, runs tests, emits the CLI)
        run: docker build -t mcdf:ci .
      - name: Smoke-test the CLI
        run: docker run --rm mcdf:ci --version
