name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  name: linux }
          - { os: windows-latest, name: windows }
          - { os: macos-latest,   name: macos }

    steps:
      - uses: actions/checkout@v4

      # vcpkg builds OpenSSL from source, so cache the installed tree.
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: build/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      # Uses each runner's preinstalled vcpkg and default generator (Make on
      # Linux/macOS, Visual Studio on Windows) - no extra tooling to install.
      - name: Configure
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_MANIFEST_FEATURES=tests \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  # The reproducible Linux build, exactly as a contributor would run it.
  docker:
    name: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (compiles, runs tests, emits the CLI)
        run: docker build -t mcdf:ci .
      - name: Smoke-test the CLI
        run: docker run --rm mcdf:ci --version
